services:
  db:
    image: postgres:16-alpine
    container_name: justtalk-db
    environment:
      POSTGRES_DB: justtalk
      POSTGRES_USER: justtalk
      POSTGRES_PASSWORD: justtalk
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: justtalk-backend
    environment:
      DATABASE_URL: postgresql+psycopg://justtalk:justtalk@db:5432/justtalk
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    image: node:20-alpine
    container_name: justtalk-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
  node_modules: